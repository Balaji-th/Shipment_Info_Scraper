<!DOCTYPE html>
<html>
<head>
    <title>Ship Info Extractor</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f6f8;
            padding:40px;
        }

        .container{
            max-width:600px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
            background:#007BFF;
            color:white;
            border:none;
            cursor:pointer;
        }

        .result{
            margin-top:20px;
            background:#f2f2f2;
            padding:15px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Ship Details Extractor</h2>

<input type="text" id="imo" placeholder="Enter IMO Number">

<button onclick="getShip()">Search</button>

<div class="result" id="result"></div>

</div>

<script>

async function getShip(){

    let imo = document.getElementById("imo").value

    let response = await fetch(`/ship/${imo}`)

    let data = await response.json()

    if(data.error){
        document.getElementById("result").innerHTML = data.error
        return
    }

    document.getElementById("result").innerHTML = `
        <b>IMO Number:</b> ${data.Imo_number} <br>
        <b>Shipyard:</b> ${data.Name_of_yard} <br>
        <b>Country:</b> ${data.Country} <br>
        <b>Hull Number:</b> ${data.Hull_number}
    `
}

</script>

</body>
</html>
